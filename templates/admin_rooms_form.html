{% extends "admin_base.html" %}

{% block title %}{% if room %}Edit{% else %}New{% endif %} Room{% endblock %}

{% block content %}
<h1>{% if room %}Edit{% else %}New{% endif %} Room</h1>
<form method="post" class="mb-3">
    <div class="mb-3">
        <label for="room_number" class="form-label">Room Number</label>
        <input type="text" class="form-control" id="room_number" name="room_number" value="{{ room.room_number if room else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="room_type" class="form-label">Room Type</label>
        <input type="text" class="form-control" id="room_type" name="room_type" value="{{ room.room_type if room else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="rate" class="form-label">Rate</label>
        <input type="number" step="0.01" class="form-control" id="rate" name="rate" value="{{ room.rate if room else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="status" class="form-label">Status</label>
        <select class="form-select" id="status" name="status">
            <option value="available" {% if not room or room.status == 'available' %}selected{% endif %}>Available</option>
            <option value="booked" {% if room and room.status == 'booked' %}selected{% endif %}>Booked</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('admin_rooms') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
