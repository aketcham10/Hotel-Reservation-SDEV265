{% extends "admin_base.html" %}

{% block title %}{% if reservation %}Edit{% else %}New{% endif %} Reservation{% endblock %}

{% block content %}
<h1>{% if reservation %}Edit{% else %}New{% endif %} Reservation</h1>
<form method="post" class="mb-3">
    <div class="mb-3">
        <label for="guest_id" class="form-label">Guest</label>
        <select class="form-select" id="guest_id" name="guest_id" required>
            {% for guest in guests %}
            <option value="{{ guest.guest_id }}" {% if reservation and reservation.guest_id == guest.guest_id %}selected{% endif %}>{{ guest.name }} ({{ guest.email }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="room_id" class="form-label">Room</label>
        <select class="form-select" id="room_id" name="room_id" required>
            {% for room in rooms %}
            <option value="{{ room.room_id }}" {% if reservation and reservation.room_id == room.room_id %}selected{% endif %}>{{ room.room_number }} - {{ room.room_type }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="check_in" class="form-label">Check In</label>
        <input type="date" class="form-control" id="check_in" name="check_in" value="{{ reservation.check_in_date.isoformat() if reservation else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="check_out" class="form-label">Check Out</label>
        <input type="date" class="form-control" id="check_out" name="check_out" value="{{ reservation.check_out_date.isoformat() if reservation else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="status" class="form-label">Status</label>
        <select class="form-select" id="status" name="status">
            <option value="booked" {% if not reservation or reservation.status == 'booked' %}selected{% endif %}>Booked</option>
            <option value="cancelled" {% if reservation and reservation.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('admin_reservations') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
